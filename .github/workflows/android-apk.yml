name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java (required for Android builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Debug project structure
      - name: Show project files
        run: ls -R

      # 4. Make gradlew executable (Now correctly points to android/gradlew)
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 5. Build APK (Debug)
      # Added 'cd android' to ensure we run inside the correct directory
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 6. Upload APK artifact
      # Updated path to include the android/ prefix
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
